[theme]
primaryColor = "#7B2CBF"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "minimal"

[logger]
level = "info"
messageFormat = "%(asctime)s - %(levelname)s - %(message)s"

[server]
headless = true
runOnSave = true
port = 8501

[browser]
gatherUsageStats = false
